{% extends "base.html" %}

{% block content %}
<style>
    .chart-controls .btn { font-size: 0.72rem; padding: 0.3rem 0.85rem; font-weight: 700; letter-spacing: 0.02em; }
    .section-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .stat-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 0.5rem;
        margin-bottom: 1rem;
    }
    .stat-item {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        padding: 0.6rem 0.85rem;
        display: flex; flex-direction: column; gap: 2px;
    }
    .stat-item-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
    .stat-item-value { font-size: 1.05rem; font-weight: 800; line-height: 1; }
</style>

<div class="container-fluid px-0" style="max-width: 1200px; margin: 0 auto;">
    <div class="glass-card p-3">

        <!-- Header row -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <div>
                <div class="fw-bold text-info" style="font-size: clamp(0.85rem, 2vw, 1rem); letter-spacing: 0.5px;">
                    ENVIRONMENTAL CORRELATION
                </div>
                <div class="section-label mt-1">Live Sensor Analytics — Temperature vs Humidity</div>
            </div>
            <div class="chart-controls btn-group shadow-sm">
                <button class="btn btn-sm btn-outline-info active">LINE</button>
                <button class="btn btn-sm btn-outline-info">AREA</button>
            </div>
        </div>

        <!-- Live stat chips -->
        <div class="stat-bar">
            <div class="stat-item">
                <span class="stat-item-label">🌡 Temperature</span>
                <span id="live-temp" class="stat-item-value" style="color: #f59e0b;">-- °C</span>
            </div>
            <div class="stat-item">
                <span class="stat-item-label">💧 Humidity</span>
                <span id="live-hum" class="stat-item-value" style="color: #38bdf8;">-- %</span>
            </div>
            <div class="stat-item">
                <span class="stat-item-label">📈 Temp Range</span>
                <span id="live-temp-range" class="stat-item-value text-secondary">-- / --</span>
            </div>
            <div class="stat-item">
                <span class="stat-item-label">📉 Hum Range</span>
                <span id="live-hum-range" class="stat-item-value text-secondary">-- / --</span>
            </div>
        </div>

        <!-- Chart -->
        <div style="height: 320px;">
            <canvas id="dualChart"></canvas>
        </div>

    </div>
</div>

<script>
    let mainChart;
    let tempMin = null, tempMax = null, humMin = null, humMax = null;

    document.addEventListener('DOMContentLoaded', () => {
        const ctx = document.getElementById('dualChart').getContext('2d');
        const gradient1 = ctx.createLinearGradient(0, 0, 0, 320);
        gradient1.addColorStop(0, 'rgba(245,158,11,0.18)');
        gradient1.addColorStop(1, 'transparent');
        const gradient2 = ctx.createLinearGradient(0, 0, 0, 320);
        gradient2.addColorStop(0, 'rgba(59,130,246,0.18)');
        gradient2.addColorStop(1, 'transparent');

        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Temperature (°C)',
                        data: [], borderColor: '#f59e0b', backgroundColor: gradient1,
                        fill: true, yAxisID: 'y', tension: 0.4, borderWidth: 2.5, pointRadius: 0
                    },
                    {
                        label: 'Humidity (%)',
                        data: [], borderColor: '#3b82f6', backgroundColor: gradient2,
                        fill: true, yAxisID: 'y1', tension: 0.4, borderWidth: 2.5, pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#64748b', maxRotation: 0, font: { size: 9 }, maxTicksLimit: 8 }
                    },
                    y: {
                        position: 'left',
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#f59e0b', font: { size: 10 } },
                        title: { display: true, text: 'Temp (°C)', color: '#f59e0b', font: { size: 10 } }
                    },
                    y1: {
                        position: 'right',
                        grid: { display: false },
                        ticks: { color: '#3b82f6', font: { size: 10 } },
                        title: { display: true, text: 'Hum (%)', color: '#3b82f6', font: { size: 10 } }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#cbd5e1', usePointStyle: true, boxWidth: 6, font: { size: 11 }, padding: 16 }
                    }
                }
            }
        });
    });

    window.onUpdate = function(d) {
        if (d.history.length > 0) {
            const temps = d.history.map(x => x.temperature).filter(v => v != null);
            const hums  = d.history.map(x => x.humidity).filter(v => v != null);

            mainChart.data.labels = d.history.map(x => x.timestamp);
            mainChart.data.datasets[0].data = d.history.map(x => x.temperature);
            mainChart.data.datasets[1].data = d.history.map(x => x.humidity);
            mainChart.update('none');

            // Update live stats
            document.getElementById('live-temp').textContent = d.current.temperature != null ? d.current.temperature + ' °C' : '-- °C';
            document.getElementById('live-hum').textContent  = d.current.humidity    != null ? d.current.humidity    + ' %'  : '-- %';

            if (temps.length) {
                const tMin = Math.min(...temps).toFixed(1);
                const tMax = Math.max(...temps).toFixed(1);
                document.getElementById('live-temp-range').textContent = `${tMin} / ${tMax}`;
            }
            if (hums.length) {
                const hMin = Math.min(...hums).toFixed(1);
                const hMax = Math.max(...hums).toFixed(1);
                document.getElementById('live-hum-range').textContent = `${hMin} / ${hMax}`;
            }
        }
    };
</script>
{% endblock %}
